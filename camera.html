<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Recognition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0e6dc; text-align: center; padding: 20px; margin: 0; }
        .container { background: white; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        
        /* Καθαρή εμφάνιση κάμερας χωρίς περιττά στοιχεία */
        #webcam-container { 
            border-radius: 20px; 
            border: 6px solid #4CAF50; 
            overflow: hidden; 
            display: inline-block; 
            line-height: 0; 
            width: 400px; 
            height: 400px; 
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        #status { font-size: 18px; margin-top: 15px; color: #666; font-weight: 500; }
        .controls { margin-top: 25px; }
        
        button { 
            padding: 15px 35px; font-size: 18px; border-radius: 50px; border: none; 
            cursor: pointer; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .voice-select { margin-bottom: 20px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Live Αναγνώριση</h2>
    
    <select id="voice-type" class="voice-select">
        <option value="female">Γυναικεία Φωνή</option>
        <option value="male">Αντρική Φωνή</option>
    </select>

    <div id="webcam-container"></div>
    
    <div id="status">Περιμένω την έναρξη...</div>

    <div class="controls">
        <button onclick="init()">Ενεργοποίηση Κάμερας</button>
    </div>
    
    <a href="index.html" class="back-link">⬅ Επιστροφή στο κεντρικό μενού</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
    // Σύνδεσμος προς το νέο Image Model
    const URL = "https://teachablemachine.withgoogle.com/models/a1pcBq62k/";
    
    let model, webcam, maxPredictions;
    let lastPlayedLabel = "";
    let lastPlayedTime = 0;

    async function init() {
        document.getElementById("status").innerText = "Φόρτωση συστήματος...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true; 
        webcam = new tmImage.Webcam(400, 400, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; 
        container.appendChild(webcam.canvas);
        document.getElementById("status").innerText = "Σύστημα Ενεργό";
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);

        let bestName = "";
        let bestProb = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestName = prediction[i].className;
            }
        }

        // Έλεγχος: Ακρίβεια > 85% και αποκλεισμός της κλάσης Background
        if (bestProb > 0.85 && bestName.toLowerCase() !== "background") {
            // Δεν εμφανίζουμε κείμενο, καλούμε μόνο τη συνάρτηση ήχου
            handleAudio(bestName);
        }
    }

    function handleAudio(label) {
        let currentTime = Date.now();
        
        // Χρονική δικλείδα 3.5 δευτερολέπτων για να μην επαναλαμβάνεται ο ήχος συνεχόμενα
        if (label !== lastPlayedLabel || (currentTime - lastPlayedTime > 3500)) {
            const voice = document.getElementById("voice-type").value;
            
            // Μετατροπή ονόματος κλάσης σε όνομα αρχείου ήχου
            // π.χ. "Geia" -> "geia.female.wav"
            let cleanLabel = label.toLowerCase().replace(/ /g, "_").replace(/\./g, "_");
            let fileName = cleanLabel + "." + voice + ".wav";
            
            let audio = new Audio(fileName);
            audio.play().catch(e => console.log("Απαιτείται κλικ για την αναπαραγωγή ήχου."));
            
            lastPlayedLabel = label;
            lastPlayedTime = currentTime;
        }
    }
</script>
</body>
</html>
