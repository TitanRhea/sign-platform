<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Recognition & Avatar</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0e6dc; text-align: center; margin: 0; padding: 20px; }
        .container { background: white; max-width: 900px; margin: auto; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Περιοχή Αβατάρ */
        #avatar-container {
            width: 350px; height: 350px; margin: 20px auto;
            background: #fff; border-radius: 20px; border: 4px solid #27ae60;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        #avatar-img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.2s; }

        .status-box { font-size: 26px; font-weight: bold; color: #2ecc71; margin: 20px; min-height: 50px; text-transform: uppercase; }
        .controls { margin-top: 20px; background: #f9f9f9; padding: 20px; border-radius: 15px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        
        .pulse { animation: pulse-animation 0.5s ease-in-out; }
        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🤖 SignAI | Σύνδεση με Αβατάρ</h2>
    
    <div class="controls">
        <label>Επιλογή Φωνής: </label>
        <select id="voice-type">
            <option value="female">Γυναικεία Φωνή</option>
            <option value="male">Αντρική Φωνή</option>
        </select>
    </div>

    <div id="avatar-container">
        <img id="avatar-img" src="avatar_neutral.png" alt="Avatar">
    </div>

    <div id="status" class="status-box">ΠΕΡΙΜΕΝΩ ΤΟΝ SERVER...</div>
    
    <p style="color: #888;">Βεβαιωθείτε ότι το <b>app.py</b> εκτελείται στον υπολογιστή σας.</p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

<script>
    // Σύνδεση με τον Python Server που τρέχει τοπικά
    const socket = io("http://localhost:5000");
    const statusDiv = document.getElementById("status");
    const avatarImg = document.getElementById("avatar-img");

    socket.on('connect', () => {
        statusDiv.innerText = "ΕΤΟΙΜΟΣ ΓΙΑ ΑΝΑΓΝΩΡΙΣΗ";
        statusDiv.style.color = "#27ae60";
    });

    socket.on('disconnect', () => {
        statusDiv.innerText = "ΑΠΟΣΥΝΔΕΘΗΚΕ Ο SERVER";
        statusDiv.style.color = "#e74c3c";
    });

    // Λήψη λέξης από την Python
    socket.on('new_sign', function(data) {
        const word = data.word;
        console.log("Αναγνωρίστηκε:", word);
        
        // 1. Ενημέρωση Κειμένου
        let displayText = word;
        if (word === "onoma") displayText = "Ποιο είναι το όνομά σου;";
        statusDiv.innerText = displayText;

        // 2. Ήχος
        playAudio(word);

        // 3. Κίνηση Αβατάρ
        animateAvatar(word);
    });

    function playAudio(word) {
        const voice = document.getElementById("voice-type").value;
        let filename = word;
        if (word === "onoma") filename = "poio.einai.to.onoma.sou";
        
        let audio = new Audio(filename + "." + voice + ".wav");
        audio.play().catch(err => console.log("Δεν βρέθηκε το αρχείο ήχου: " + filename));
    }

    function animateAvatar(word) {
        // Εφέ παλμού στην εικόνα
        avatarImg.classList.remove("pulse");
        void avatarImg.offsetWidth; // trigger reflow
        avatarImg.classList.add("pulse");

        // Αλλαγή εικόνας ανάλογα με τη λέξη (προαιρετικά)
        // Αν έχεις εικόνες π.χ. avatar_geia.png, avatar_kalimera.png κλπ.
        const originalSrc = "avatar_neutral.png";
        const wordSrc = "avatar_" + word + ".png";

        // Δοκιμάζει να αλλάξει εικόνα για 1.5 δευτερόλεπτο και μετά γυρνάει στην αρχική
        let tempImg = new Image();
        tempImg.src = wordSrc;
        tempImg.onload = () => {
            avatarImg.src = wordSrc;
            setTimeout(() => { avatarImg.src = originalSrc; }, 1500);
        };
    }
</script>

</body>
</html>
