<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Recognition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .container { background: white; max-width: 700px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        #webcam-container { background: #000; border-radius: 15px; overflow: hidden; display: inline-block; line-height: 0; }
        #label-container { font-size: 30px; margin-top: 20px; color: #27ae60; font-weight: bold; min-height: 45px; }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: #95a5a6; color: white; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-block; }
        .voice-select { margin-bottom: 15px; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Live Αναγνώριση</h2>
    
    <select id="voice-type" class="voice-select">
        <option value="female">Γυναικεία Φωνή</option>
        <option value="male">Αντρική Φωνή</option>
    </select>
    <br>

    <div id="webcam-container"></div>
    <div id="label-container">Φόρτωση...</div>
    
    <br>
    <button onclick="init()" style="padding:15px 30px; font-size:18px; background:#27ae60; color:white; border:none; border-radius:10px; cursor:pointer;">Έναρξη Κάμερας</button>
    <br>
    <a href="index.html" class="back-btn">⬅ Επιστροφή στο Menu</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/og7WNpa1A/";
    let model, webcam, labelContainer, maxPredictions;
    let lastPlayedLabel = "";
    let lastPlayedTime = 0;

    async function init() {
        document.getElementById("label-container").innerText = "Εκκίνηση AI...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        webcam = new tmPose.Webcam(480, 480, true); 
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        let bestName = "";
        let bestProb = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestName = prediction[i].className;
            }
        }

        if (bestProb > 0.90) { // 90% σιγουριά
            labelContainer.innerText = bestName;
            handleAudio(bestName);
        } else {
            labelContainer.innerText = "Κάνε μια κίνηση...";
        }
    }

    function handleAudio(label) {
        let currentTime = Date.now();
        // Παίζει ήχο μόνο αν άλλαξε η λέξη Ή αν πέρασαν 3 δευτερόλεπτα (για να μην "κολλάει" ο ήχος)
        if (label !== lastPlayedLabel || (currentTime - lastPlayedTime > 3000)) {
            const voice = document.getElementById("voice-type").value;
            // Μετατροπή label σε όνομα αρχείου (π.χ. "GEIA" -> "geia")
            let fileName = label.toLowerCase().replace(/ /g, "_") + "." + voice + ".wav";
            
            let audio = new Audio(fileName);
            audio.play().catch(e => console.log("Περιμένω αλληλεπίδραση για τον ήχο..."));
            
            lastPlayedLabel = label;
            lastPlayedTime = currentTime;
        }
    }
</script>
</body>
</html>
