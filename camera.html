<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Recognition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0e6dc; text-align: center; padding: 20px; margin: 0; }
        .container { background: white; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        
        /* Καθαρό Βίντεο (Χωρίς Σκελετό) */
        #webcam-container { 
            border-radius: 20px; border: 6px solid #4CAF50; overflow: hidden; 
            display: inline-block; line-height: 0; width: 400px; height: 400px; background: #000;
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        #status { font-size: 18px; margin-top: 15px; color: #666; font-weight: 500; }
        .controls { margin-top: 25px; }
        
        button { 
            padding: 15px 35px; font-size: 18px; border-radius: 50px; border: none; 
            cursor: pointer; background: #4CAF50; color: white; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .voice-select { margin-bottom: 20px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Live Αναγνώριση (Smart AI)</h2>
    
    <select id="voice-type" class="voice-select">
        <option value="female">Γυναικεία Φωνή</option>
        <option value="male">Αντρική Φωνή</option>
    </select>

    <div id="webcam-container"></div>
    <div id="status">Περιμένω την έναρξη...</div>

    <div class="controls">
        <button onclick="init()">Ενεργοποίηση Κάμερας</button>
    </div>
    
    <a href="index.html" class="back-link">⬅ Επιστροφή στο κεντρικό μενού</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/posenet"></script>

<script>
    // Το Image Model Link σου
    const URL = "https://teachablemachine.withgoogle.com/models/a1pcBq62k/";
    
    let imageModel, poseNetModel, webcam, maxPredictions;
    let lastPlayedLabel = "";
    let lastPlayedTime = 0;
    
    // Σταθεροποιητής Κίνησης
    let consecutiveFrames = 0;
    let currentCandidate = "";

    async function init() {
        document.getElementById("status").innerText = "Φόρτωση Διπλού AI (Παρακαλώ περιμένετε)...";
        
        // 1. Φόρτωση του δικού σου Image Model
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        imageModel = await tmImage.load(modelURL, metadataURL);
        maxPredictions = imageModel.getTotalClasses();

        // 2. Φόρτωση του PoseNet (Σκελετός) στο παρασκήνιο, ελαφριά έκδοση
        poseNetModel = await posenet.load({
            architecture: 'MobileNetV1',
            outputStride: 16,
            multiplier: 0.50, // Ελαφρύ για ταχύτητα
            quantBytes: 2
        });

        const flip = true; 
        webcam = new tmImage.Webcam(400, 400, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; 
        container.appendChild(webcam.canvas);
        
        document.getElementById("status").innerText = "🟢 Σύστημα Ενεργό. Μίλησε με τα χέρια σου!";
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        // ΤΡΕΧΟΥΝ ΤΑΥΤΟΧΡΟΝΑ ΓΙΑ ΤΑΧΥΤΗΤΑ
        const [imagePrediction, posePrediction] = await Promise.all([
            imageModel.predict(webcam.canvas),
            poseNetModel.estimateSinglePose(webcam.canvas, { flipHorizontal: false })
        ]);

        let bestName = "";
        let bestProb = 0;

        // Βρίσκουμε τι πιστεύει το Image Model
        for (let i = 0; i < maxPredictions; i++) {
            if (imagePrediction[i].probability > bestProb) {
                bestProb = imagePrediction[i].probability;
                bestName = imagePrediction[i].className;
            }
        }

        let label = bestName.toLowerCase();
        let isValid = false;

        // Οριο Σιγουριάς 80% (όπως ζήτησες)
        if (bestProb > 0.80 && label !== "background" && label !== "τίποτα") {
            
            const keypoints = posePrediction.keypoints;
            const getPart = (name) => keypoints.find(k => k.part === name);
            const isVis = (p) => p && p.score > 0.3; // Απλή ορατότητα

            const nose = getPart('nose');
            const rWrist = getPart('rightWrist');
            const lWrist = getPart('leftWrist');
            const rElbow = getPart('rightElbow');
            const lElbow = getPart('leftElbow');
            const rShoulder = getPart('rightShoulder');

            // --- ΟΙ ΔΙΚΛΕΙΔΕΣ ΑΣΦΑΛΕΙΑΣ ΣΟΥ --- //

            if (label.includes("mesimeri") || label.includes("μεσημερι")) {
                // Κανόνας: Χέρι κάθετο κοντά στο πηγούνι/μύτη
                if (isVis(rWrist) && isVis(nose)) {
                    if (Math.abs(rWrist.position.y - nose.position.y) < 150) isValid = true;
                }
            }
            else if (label.includes("efharisto") || label.includes("ευχαριστω")) {
                // Κανόνας: Δύο χέρια ψηλά στον θώρακα (πάνω από αγκώνες)
                if (isVis(rWrist) && isVis(lWrist) && isVis(rElbow) && isVis(lElbow)) {
                    if (rWrist.position.y < rElbow.position.y && lWrist.position.y < lElbow.position.y) isValid = true;
                }
            }
            else if (label.includes("geia") || label.includes("γεια") || label.includes("kalimera")) {
                // Κανόνας: Χέρι ψηλά να χαιρετάει (πάνω από τον ώμο)
                if (isVis(rWrist) && isVis(rShoulder)) {
                    if (rWrist.position.y < rShoulder.position.y + 30) isValid = true;
                } else if (isVis(lWrist) && isVis(rShoulder)) { 
                    if (lWrist.position.y < rShoulder.position.y + 30) isValid = true;
                }
            }
            else if (label.includes("onoma") || label.includes("ονομα")) {
                // Κανόνας: Και τα δύο χέρια εμφανή
                if (isVis(rWrist) && isVis(lWrist)) isValid = true;
            }
            else {
                isValid = true; // Αν προστεθεί άλλη λέξη
            }
            
            // --- ΣΤΑΘΕΡΟΠΟΙΗΤΗΣ (Αν πέρασε τον κανόνα του σώματος) --- //
            if (isValid) {
                if (label === currentCandidate) {
                    consecutiveFrames++;
                } else {
                    currentCandidate = label;
                    consecutiveFrames = 1;
                }

                // Πρέπει να το κάνει σταθερά για 5-6 καρέ (πολύ γρήγορο, αλλά ασφαλές)
                if (consecutiveFrames >= 6) {
                    handleAudio(bestName);
                    consecutiveFrames = 0; // Μηδενισμός
                }
            } else {
                consecutiveFrames = 0;
            }

        } else {
            consecutiveFrames = 0;
            currentCandidate = "";
        }
    }

    function handleAudio(label) {
        let currentTime = Date.now();
        
        // Cooldown 3.5 δευτερολέπτων
        if (label !== lastPlayedLabel || (currentTime - lastPlayedTime > 3500)) {
            const voice = document.getElementById("voice-type").value;
            let cleanLabel = label.toLowerCase().replace(/ /g, "_").replace(/\./g, "_");
            let fileName = cleanLabel + "." + voice + ".wav";
            
            let audio = new Audio(fileName);
            audio.play().catch(e => console.log("Απαιτείται κλικ..."));
            
            lastPlayedLabel = label;
            lastPlayedTime = currentTime;
        }
    }
</script>
</body>
</html>
