<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Recognition</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0e6dc; text-align: center; padding: 20px; margin: 0; }
        .container { background: white; max-width: 600px; margin: 50px auto; padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 20px; }
        
        #webcam-container { 
            border-radius: 20px; border: 6px solid #4CAF50; overflow: hidden; 
            display: inline-block; line-height: 0; width: 400px; height: 400px; background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #webcam-container canvas { width: 100% !important; height: 100% !important; object-fit: cover; }
        
        #status { font-size: 18px; margin-top: 15px; color: #666; font-weight: 500; }
        .controls { margin-top: 25px; }
        
        #cam-btn { 
            padding: 15px 35px; font-size: 18px; border-radius: 50px; border: none; 
            cursor: pointer; background: #27ae60; color: white; font-weight: bold; transition: 0.3s;
        }
        #cam-btn:hover { transform: scale(1.05); }
        #cam-btn.active { background: #e74c3c; } 
        
        .back-link { display: inline-block; margin-top: 20px; color: #888; text-decoration: none; font-size: 14px; }
        .voice-select { margin-bottom: 20px; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Live Αναγνώριση (Smart AI)</h2>
    
    <select id="voice-type" class="voice-select">
        <option value="female">Γυναικεία Φωνή</option>
        <option value="male">Αντρική Φωνή</option>
    </select>

    <div id="webcam-container"></div>
    <div id="status">Η κάμερα είναι κλειστή.</div>

    <div class="controls">
        <button id="cam-btn" onclick="toggleCamera()">▶ Έναρξη Κάμερας</button>
    </div>
    
    <a href="index.html" class="back-link">⬅ Επιστροφή στο κεντρικό μενού</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/a1pcBq62k/";
    
    let imageModel, webcam, maxPredictions;
    let lastPlayedLabel = "";
    let lastPlayedTime = 0;
    
    // Σταθεροποιητής
    let consecutiveFrames = 0;
    let currentCandidate = "";
    
    let isCameraRunning = false;
    let isSystemLoaded = false;

    async function setupSystem() {
        document.getElementById("status").innerText = "Φόρτωση AI (Παρακαλώ περιμένετε)...";
        
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        imageModel = await tmImage.load(modelURL, metadataURL);
        maxPredictions = imageModel.getTotalClasses();

        webcam = new tmImage.Webcam(400, 400, true); 
        await webcam.setup(); 
        
        const container = document.getElementById("webcam-container");
        container.innerHTML = ""; 
        container.appendChild(webcam.canvas);
        
        isSystemLoaded = true;
    }

    async function toggleCamera() {
        const btn = document.getElementById("cam-btn");
        
        if (!isCameraRunning) {
            if (!isSystemLoaded) await setupSystem();
            await webcam.play();
            isCameraRunning = true;
            window.requestAnimationFrame(loop);
            
            btn.innerText = "⏹ Κλείσιμο Κάμερας";
            btn.classList.add("active");
            document.getElementById("status").innerText = "🟢 Σύστημα Ενεργό. Μίλησε με τα χέρια σου!";
            new Audio("").play().catch(e => {}); 
        } else {
            webcam.stop();
            isCameraRunning = false;
            
            btn.innerText = "▶ Έναρξη Κάμερας";
            btn.classList.remove("active");
            document.getElementById("status").innerText = "🔴 Η κάμερα είναι κλειστή.";
        }
    }

    async function loop() {
        if (!isCameraRunning) return; 
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await imageModel.predict(webcam.canvas);

        let bestName = "";
        let bestProb = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestName = prediction[i].className;
            }
        }

        let label = bestName.toLowerCase();
        
        // --- ΝΕΑ ΟΡΙΑ ΣΙΓΟΥΡΙΑΣ --- 
        // 85% για Γεια/Καλημέρα (μειώθηκε από 95%), 80% για τα άλλα.
        let requiredConfidence = 0.80; 
        if (label.includes("geia") || label.includes("γεια") || label.includes("kalimera") || label.includes("καλημερα")) {
            requiredConfidence = 0.85;
        }

        if (bestProb > requiredConfidence && label !== "background" && label !== "τίποτα") {
            
            if (label === currentCandidate) {
                consecutiveFrames++;
            } else {
                currentCandidate = label;
                consecutiveFrames = 1;
            }

            // Ο σταθεροποιητής μειώθηκε στα 5 καρέ 
            if (consecutiveFrames >= 5) {
                handleAudio(bestName);
                consecutiveFrames = 0; 
            }

        } else {
            consecutiveFrames = 0;
            currentCandidate = "";
        }
    }

    function handleAudio(label) {
        let currentTime = Date.now();
        
        if (label !== lastPlayedLabel || (currentTime - lastPlayedTime > 3500)) {
            const voice = document.getElementById("voice-type").value;
            let cleanLabel = label.toLowerCase().replace(/ /g, "_").replace(/\./g, "_");
            let fileName = cleanLabel + "." + voice + ".wav";
            
            let audio = new Audio(fileName);
            audio.play().catch(e => console.log("Απαιτείται κλικ..."));
            
            lastPlayedLabel = label;
            lastPlayedTime = currentTime;
        }
    }
</script>
</body>
</html>
