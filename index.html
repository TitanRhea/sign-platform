<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI Platform | Olga's Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0e6dc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .hub-container { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .btn-group { display: flex; gap: 20px; }
        .mode-btn { 
            padding: 20px 40px; font-size: 20px; border: none; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; color: white; text-decoration: none; font-weight: bold;
        }
        .rec-btn { background: #27ae60; } /* Πράσινο για Κάμερα */
        .ava-btn { background: #4CAF50; } /* Το χρώμα του Avatar σου */
        .mode-btn:hover { transform: scale(1.05); opacity: 0.9; }
    </style>
</head>
<body>

<div class="hub-container">
    <h1>🤟 Καλώς ήρθες στο SignAI</h1>
    <p>Επίλεξε τη λειτουργία που θέλεις να χρησιμοποιήσεις:</p>
    <div class="btn-group">
        <a href="camera.html" class="mode-btn rec-btn">📸 Αναγνώριση <br>(Κάμερα προς Κείμενο)</a>
        <a href="avatar.html" class="mode-btn ava-btn">🤖 Avatar <br>(Φωνή προς Νοηματική)</a>
    </div>
</div>

</body>
</html>
