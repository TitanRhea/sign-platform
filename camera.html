<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>SignAI | Live Αναγνώριση</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; text-align: center; padding: 20px; }
        .container { background: white; max-width: 700px; margin: auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        #canvas { border-radius: 15px; border: 4px solid #34495e; background: #000; width: 400px; height: 400px; object-fit: cover; }
        #main-result { font-size: 32px; margin-top: 20px; color: #27ae60; font-weight: bold; min-height: 45px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .back-btn { margin-top: 20px; padding: 10px 20px; background: #95a5a6; color: white; border: none; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-block; }
        .voice-select { margin-bottom: 15px; padding: 8px; border-radius: 5px; font-size: 16px; }
        button.start-btn { padding: 15px 30px; font-size: 18px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button.start-btn:hover { background: #219653; }
    </style>
</head>
<body>

<div class="container">
    <h2>📸 Live Αναγνώριση</h2>
    
    <select id="voice-type" class="voice-select">
        <option value="female">Γυναικεία Φωνή</option>
        <option value="male">Αντρική Φωνή</option>
    </select>
    <br>

    <div><canvas id="canvas" width="400" height="400"></canvas></div>
    
    <div id="main-result">Πατήστε Έναρξη</div>
    
    <br>
    <button class="start-btn" onclick="init()">▶ Έναρξη Κάμερας</button>
    <br>
    <a href="index.html" class="back-btn">⬅ Επιστροφή στο Menu</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>

<script>
    const URL = "https://teachablemachine.withgoogle.com/models/og7WNpa1A/";
    let model, webcam, ctx, maxPredictions;
    let lastPlayedLabel = "";
    let lastPlayedTime = 0;

    async function init() {
        document.getElementById("main-result").innerText = "Φόρτωση AI...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 400; 
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        ctx = canvas.getContext("2d");
    }

    async function loop(timestamp) {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        let bestName = "";
        let bestProb = 0;

        for (let i = 0; i < maxPredictions; i++) {
            if (prediction[i].probability > bestProb) {
                bestProb = prediction[i].probability;
                bestName = prediction[i].className;
            }
        }

        let isValid = false;
        let label = bestName.toLowerCase();

        // Εφαρμογή των Δικλείδων Ασφαλείας (Αν υπάρχει σκελετός και σιγουριά 85%+)
        if (bestProb > 0.85 && pose && pose.keypoints) {
            
            // Βρίσκουμε τα σημεία του σώματος
            const getPart = (name) => pose.keypoints.find(k => k.part === name);
            const isVis = (p) => p && p.score > 0.4; // Πρέπει να φαίνεται καθαρά

            const nose = getPart('nose');
            const rWrist = getPart('rightWrist');
            const lWrist = getPart('leftWrist');
            const rElbow = getPart('rightElbow');
            const lElbow = getPart('leftElbow');
            const rShoulder = getPart('rightShoulder');

            // ΚΑΝΟΝΑΣ 1: Καλό Μεσημέρι (Καρπός κοντά στο πηγούνι/μύτη)
            if (label.includes("mesimeri") || label.includes("μεσημερι")) {
                if (isVis(rWrist) && isVis(nose)) {
                    // Απόσταση y μικρότερη από 150 pixels
                    if (Math.abs(rWrist.position.y - nose.position.y) < 150) isValid = true;
                }
            }
            // ΚΑΝΟΝΑΣ 2: Ευχαριστώ (Και τα δύο χέρια ψηλά)
            else if (label.includes("efharisto") || label.includes("ευχαριστω")) {
                if (isVis(rWrist) && isVis(lWrist) && isVis(rElbow) && isVis(lElbow)) {
                    // Στο canvas το y=0 είναι πάνω, άρα μικρότερο y σημαίνει πιο ψηλά
                    if (rWrist.position.y < rElbow.position.y && lWrist.position.y < lElbow.position.y) isValid = true;
                }
            }
            // ΚΑΝΟΝΑΣ 3: Όνομα (Και τα δύο χέρια ορατά μπροστά)
            else if (label.includes("onoma") || label.includes("ονομα")) {
                if (isVis(rWrist) && isVis(lWrist)) isValid = true;
            }
            // ΚΑΝΟΝΑΣ 4: Γεια / Καλημέρα (Το χέρι ψηλά πάνω από τον ώμο/αγκώνα)
            else if (label.includes("geia") || label.includes("γεια") || label.includes("kalimera") || label.includes("καλημερα")) {
                if (isVis(rWrist) && isVis(rShoulder)) {
                    if (rWrist.position.y < rShoulder.position.y + 50) isValid = true;
                } else if (isVis(lWrist) && isVis(rShoulder)) { // Σε περίπτωση που χρησιμοποιεί το αριστερό
                    if (lWrist.position.y < rShoulder.position.y + 50) isValid = true;
                }
            }
            // Αν είναι κάτι άλλο, απλά δέξου το
            else {
                isValid = true;
            }
        }

        // Εμφάνιση αποτελέσματος ΜΟΝΟ αν περάσει τον έλεγχο
        if (isValid) {
            document.getElementById("main-result").innerText = "Αναγνώριση: " + bestName;
            handleAudio(bestName);
        } else {
            document.getElementById("main-result").innerText = "Κάνε μια κίνηση...";
        }

        drawPose(pose);
    }

    function drawPose(pose) {
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                const minPartConfidence = 0.5;
                tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
            }
        }
    }

    function handleAudio(label) {
        let currentTime = Date.now();
        // Ξαναπαίζει τον ήχο μόνο αν έχουν περάσει 3.5 δευτερόλεπτα
        if (label !== lastPlayedLabel || (currentTime - lastPlayedTime > 3500)) {
            const voice = document.getElementById("voice-type").value;
            let fileName = label.toLowerCase().replace(/ /g, "_") + "." + voice + ".wav";
            
            let audio = new Audio(fileName);
            audio.play().catch(e => console.log("Απαιτείται κλικ..."));
            
            lastPlayedLabel = label;
            lastPlayedTime = currentTime;
        }
    }
</script>
</body>
</html>
