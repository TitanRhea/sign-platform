<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignAI | Αναγνώριση Νοηματικής</title>
    <style>
        body { 
            margin: 0; 
            background-color: #f0e6dc; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh;
        }
        
        /* Το βίντεο της κάμερας σου στο κέντρο */
        #video-container { 
            width: 640px; 
            max-width: 90%; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 5px solid white; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            background: black;
            position: relative;
        }
        #input_video { 
            width: 100%; 
            height: auto; 
            transform: scaleX(-1); /* Καθρέφτης */
            display: block; 
        }

        /* Ο Υπότιτλος κάτω από το βίντεο */
        #ui-layer { 
            margin-top: 30px; 
            text-align: center; 
        }
        #subtitle { 
            font-size: 32px; 
            color: #333; 
            background: white; 
            padding: 20px 40px; 
            border-radius: 30px; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            min-width: 300px;
        }
        
        /* Κατάσταση Σύνδεσης */
        #connection-status { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-weight: bold; 
            z-index: 10; 
            transition: 0.3s;
        }
        .online { background: #4CAF50; color: white; }
        .offline { background: #f44336; color: white; }
        
        h1 { color: #333; margin-bottom: 20px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="connection-status" class="offline">Εγκέφαλος: Αποσυνδεδεμένος</div>
    
    <h1>Αναγνώριση Ελληνικής Νοηματικής</h1>
    
    <div id="video-container">
        <video id="input_video" autoplay playsinline></video>
    </div>
    
    <div id="ui-layer">
        <div id="subtitle">Περιμένω κίνηση...</div>
    </div>

    <script>
        // --- 1. ΣΥΝΔΕΣΗ ΜΕ RENDER ---
        const socket = io("https://sign-ai-server.onrender.com");
        
        socket.on('connect', () => {
            document.getElementById("connection-status").innerText = "Εγκέφαλος AI: Συνδεδεμένος";
            document.getElementById("connection-status").className = "online";
        });

        // Μετάφραση των greeklish του AI σε κανονικά Ελληνικά για την εκφώνηση
        const translations = {
            'efharisto': 'Ευχαριστώ',
            'kalimera': 'Καλημέρα',
            'kalo_mesimeri': 'Καλό μεσημέρι'
        };

        let is_speaking = false;

        // Όταν το Render αναγνωρίζει λέξη:
        socket.on('new_sign', (data) => {
            if (is_speaking) return; // Μην διακόπτεις αν ήδη μιλάει

            const raw_word = data.word;
            const greek_word = translations[raw_word] || raw_word;

            // 1. Δείξε τη λέξη στην οθόνη
            document.getElementById("subtitle").innerText = greek_word;
            
            // 2. Εκφώνησε τη λέξη (Ήχος)
            speakWord(greek_word);
        });

        // Συνάρτηση Ήχου (Text-to-Speech)
        function speakWord(text) {
            is_speaking = true;
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'el-GR'; // Ελληνική Φωνή
            msg.rate = 1.0;
            
            msg.onend = function() {
                setTimeout(() => {
                    is_speaking = false;
                    document.getElementById("subtitle").innerText = "Περιμένω κίνηση...";
                }, 1000);
            };

            window.speechSynthesis.speak(msg);
        }

        // --- 2. MEDIAPIPE (Η Κάμερα) ---
        const videoElement = document.getElementById('input_video');
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        let lastEmitTime = 0;
        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const now = Date.now();
                if (now - lastEmitTime > 100 && !is_speaking) { 
                    const landmarks = results.multiHandLandmarks[0].map(lm => ({ x: lm.x, y: lm.y, z: lm.z }));
                    socket.emit('process_landmarks', { landmarks: landmarks });
                    lastEmitTime = now;
                }
            }
        });

        const camera_mp = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640,
            height: 480
        });
        
        camera_mp.start().then(() => {
            console.log("Η κάμερα ξεκίνησε.");
        });
    </script>
</body>
</html>
